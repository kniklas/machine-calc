name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly dependency-vulnerability scan, independent of pull request
    # activity (spec.md FR-005; specs/003-ci-quality-security-gates).
    - cron: "0 6 * * 1"
  # Allows manually re-running the scan (e.g. T033's post-merge validation,
  # or confirming a fix after a disclosed CVE) without waiting for the cron.
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

# Least-privilege default GITHUB_TOKEN scope for every job below that does
# not define its own `permissions:` block (CodeQL actions/missing-workflow-
# permissions). Only `quality-summary` (needs pull-requests: write to post
# its comment) and `deploy-docs` (needs pages: write / id-token: write)
# require broader scopes and already declare their own job-level
# `permissions:`, which takes precedence over this default.
permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      # Cyclomatic complexity (FR-001) is enforced here via ruff's C90/mccabe
      # rule, not in a separate job (specs/003-ci-quality-security-gates
      # contracts/ci-checks-contract.md).
      - run: ruff check src/ tests/
      - run: black --check src/ tests/

  complexity:
    name: complexity
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      # Maintainability Index (FR-002) only; cyclomatic complexity is the
      # `lint` job's responsibility (see contracts/ci-checks-contract.md).
      # NOTE: xenon only wraps radon's cyclomatic-complexity harvester, not
      # its Maintainability Index metric, so it cannot enforce this check -
      # see scripts/check_maintainability.py for why.
      # `id: mi` lets the `quality-summary` job (specs/004-pr-quality-check-summary)
      # surface the script's `mi_summary` $GITHUB_OUTPUT line as a job output
      # below, without a second `radon` invocation (research.md #4).
      - id: mi
        run: python scripts/check_maintainability.py src/
    outputs:
      mi_summary: ${{ steps.mi.outputs.mi_summary }}

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: mypy src/machine_calc

  security:
    name: security
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: bandit -r src -ll

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pip-audit

  test:
    name: test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=machine_calc --cov-report=term-missing --cov-report=xml --cov-fail-under=90
      # Publishes coverage.xml to Codecov so README.md's coverage badge stays
      # auto-updating (Constitution Principle VII; specs/003-ci-quality-security-gates).
      # Requires a CODECOV_TOKEN repository secret from https://codecov.io.
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
      # Surfaces the coverage percentage to the `quality-summary` job
      # (specs/004-pr-quality-check-summary research.md #3); reuses the
      # `.coverage` data file the `pytest --cov=...` step above already left
      # in place, rather than a second coverage computation.
      - id: coverage
        run: echo "coverage_pct=$(coverage report --format=total)" >> "$GITHUB_OUTPUT"
    outputs:
      coverage_pct: ${{ steps.coverage.outputs.coverage_pct }}

  # Informational-only legacy-hardware time/memory budget signal
  # (specs/006-legacy-hardware-performance-tests). Separate from `test`;
  # never blocks merges (`continue-on-error: true` below). Its result and
  # achieved metric ARE surfaced to `quality-summary` as a distinct,
  # non-blocking row (FR-013; contracts/ci-performance-job-contract.md) via
  # the `status_label`/`metric` outputs computed below, not via
  # `needs.performance.result` (which `continue-on-error` always reports as
  # `success` regardless of the suite's actual outcome).
  performance:
    name: performance
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    env:
      MACHINE_CALC_PERFORMANCE_SUMMARY_PATH: /tmp/machine_calc_perf_summary.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: MACHINE_CALC_RUN_PERFORMANCE_TESTS=1 pytest tests/performance/ -m performance -p no:cacheprovider --no-cov
        continue-on-error: true
      # Computes the Suite Run Summary (data-model.md) from the JSON file
      # the test step above wrote (tests/performance/conftest.py's
      # pytest_sessionfinish + results.py), and surfaces `status_label`/
      # `metric` as job outputs for `quality-summary` to consume (T028/T028b).
      - id: summary
        if: always()
        env:
          # `job.status` reflects the job's own accumulated conclusion so
          # far (success/failure/cancelled) and, unlike the `cancelled()`
          # expression function, is usable outside `if:` conditions,
          # letting this step distinguish a genuinely cancelled run from a
          # normal skip-before-measurement (T034).
          JOB_STATUS: ${{ job.status }}
        run: |
          python - <<'PYEOF' >> "$GITHUB_OUTPUT"
          import json
          import os

          path = os.environ["MACHINE_CALC_PERFORMANCE_SUMMARY_PATH"]
          try:
              with open(path, encoding="utf-8") as handle:
                  data = json.load(handle)
          except (FileNotFoundError, json.JSONDecodeError):
              data = {"has_measurements": False}

          if not data.get("has_measurements"):
              is_cancelled = os.environ.get("JOB_STATUS", "") == "cancelled"
              status_label = "cancelled" if is_cancelled else "skipped"
              metric = "—"
          else:
              cpu_ok = data["cpu_pin_enforced_overall"]
              memory_ok = data["memory_ceiling_enforced_overall"]
              degraded = not (cpu_ok and memory_ok)
              if degraded:
                  status_label = "⚠️ degraded"
              elif data["overall_pass"]:
                  status_label = "pass"
              else:
                  status_label = "fail"

              worst_time = data["worst_case_time_seconds"]
              worst_memory_mb = round(data["worst_case_memory_bytes"] / (1024 * 1024))
              time_budget = data["time_budget_seconds"]
              memory_budget_mb = round(data["memory_budget_bytes"] / (1024 * 1024))
              metric = (
                  f"{worst_time:.2f}s / {worst_memory_mb}MB "
                  f"(budgets: {time_budget}s/{memory_budget_mb}MB)"
              )

          print(f"status_label={status_label}")
          print(f"metric={metric}")
          PYEOF
        continue-on-error: true
    outputs:
      status_label: ${{ steps.summary.outputs.status_label }}
      metric: ${{ steps.summary.outputs.metric }}

  build:
    name: build
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install build
      - run: python -m build

  docs:
    name: docs
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: sphinx-build -b html docs/source docs/_build/html -W
      # Uploaded unconditionally (cheap); only actually deployed by deploy-docs
      # below, which is gated to pushes on main (Constitution Principle VII).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Posts/updates a single consolidated PR comment summarizing every quality
  # check's result (specs/004-pr-quality-check-summary). Runs after all eight
  # existing quality-check jobs, even if one of them failed/was cancelled
  # (`if: always()`), so it can accurately report that outcome instead of
  # being skipped itself (research.md #2). Restricted to `pull_request` runs
  # only (FR-006) - never for `push`-to-`main`, `schedule`, or
  # `workflow_dispatch` runs.
  quality-summary:
    name: quality-summary
    needs: [lint, complexity, typecheck, security, dependency-scan, test, build, docs, performance]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # Assembles the Markdown table + overall status into a file, which is
      # handed to the comment-posting step below via `path:` (research.md
      # #5). Failures here are left to fail this step normally (not
      # continue-on-error) since they indicate a bug in this logic, not a
      # permissions/environment limitation (research.md #6).
      - name: Build summary
        id: build-summary
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          COMPLEXITY_RESULT: ${{ needs.complexity.result }}
          COMPLEXITY_METRIC: ${{ needs.complexity.outputs.mi_summary }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DEPENDENCY_SCAN_RESULT: ${{ needs.dependency-scan.result }}
          TEST_RESULT: ${{ needs.test.result }}
          TEST_METRIC: ${{ needs.test.outputs.coverage_pct }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          PERFORMANCE_STATUS: ${{ needs.performance.outputs.status_label }}
          PERFORMANCE_METRIC: ${{ needs.performance.outputs.metric }}
        run: |
          set -euo pipefail

          # status_label STATUS -> a distinct label per success/failure/
          # cancelled/skipped (contracts/pr-summary-comment-contract.md
          # Output contract item 1; never collapses skipped/cancelled into a
          # bare "failed", never omits a row).
          status_label() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failure" ;;
              cancelled) echo "🚫 cancelled" ;;
              skipped) echo "⏭️ skipped" ;;
              *) echo "❓ unknown" ;;
            esac
          }

          # metric_or_placeholder VALUE -> the metric string, or the
          # explicit "no metric" placeholder if absent/empty (data-model.md
          # Quality Check Result; spec.md FR-005, US3 Acceptance Scenario 3).
          metric_or_placeholder() {
            if [ -n "$1" ]; then echo "$1"; else echo "—"; fi
          }

          # performance_status_label STATUS -> renders the performance job's
          # own status vocabulary (pass/fail/⚠️ degraded/skipped/cancelled -
          # data-model.md's Suite Run Summary.status_label), distinct from
          # the success/failure/cancelled/skipped vocabulary every other
          # `needs.<job>.result` uses, since `⚠️ degraded` is not one of
          # GitHub Actions' own job-result values (FR-013 Clarifications #3;
          # specs/004-pr-quality-check-summary FR-010).
          performance_status_label() {
            case "$1" in
              pass) echo "✅ pass" ;;
              fail) echo "❌ fail" ;;
              "⚠️ degraded") echo "⚠️ degraded" ;;
              skipped) echo "⏭️ skipped" ;;
              cancelled) echo "🚫 cancelled" ;;
              *) echo "❓ unknown" ;;
            esac
          }

          {
            echo "<!-- quality-check-summary -->"
            echo "### Quality Check Summary"
            echo
            echo "| Check | Status | Metric |"
            echo "|---|---|---|"
            echo "| lint | $(status_label "$LINT_RESULT") | $(metric_or_placeholder "") |"
            echo "| complexity | $(status_label "$COMPLEXITY_RESULT") | $(metric_or_placeholder "$COMPLEXITY_METRIC") |"
            echo "| typecheck | $(status_label "$TYPECHECK_RESULT") | $(metric_or_placeholder "") |"
            echo "| security | $(status_label "$SECURITY_RESULT") | $(metric_or_placeholder "") |"
            echo "| dependency-scan | $(status_label "$DEPENDENCY_SCAN_RESULT") | $(metric_or_placeholder "") |"
            echo "| test | $(status_label "$TEST_RESULT") | $(metric_or_placeholder "$TEST_METRIC") |"
            echo "| build | $(status_label "$BUILD_RESULT") | $(metric_or_placeholder "") |"
            echo "| docs | $(status_label "$DOCS_RESULT") | $(metric_or_placeholder "") |"
            # `performance` is informational-only (specs/006-legacy-hardware-
            # performance-tests FR-013): shown here with its own metric, but
            # deliberately excluded from the `results=...` overall-status
            # computation below, the same way `⚠️ degraded` is never folded
            # into pass/fail.
            echo "| performance | $(performance_status_label "$PERFORMANCE_STATUS") | $PERFORMANCE_METRIC |"
            echo
            # Overall status (data-model.md PR Summary Comment.overall_status):
            # FAIL if any check failed; else cancelled/incomplete if any
            # check was cancelled; else PASS. A `skipped` check never flips
            # this by itself (spec.md Assumptions).
            results="$LINT_RESULT $COMPLEXITY_RESULT $TYPECHECK_RESULT $SECURITY_RESULT $DEPENDENCY_SCAN_RESULT $TEST_RESULT $BUILD_RESULT $DOCS_RESULT"
            if echo "$results" | grep -qw "failure"; then
              echo "**Overall status: ❌ FAIL**"
            elif echo "$results" | grep -qw "cancelled"; then
              echo "**Overall status: 🚫 CANCELLED**"
            else
              echo "**Overall status: ✅ PASS**"
            fi
          } > summary.md

      # Posts/updates the single PR comment identified by `header:` (never
      # more than one per PR, edited in place on every subsequent run -
      # contracts/pr-summary-comment-contract.md Idempotency contract).
      # `continue-on-error: true` on this step only (not the whole job) so a
      # posting failure (e.g. a fork PR's read-only GITHUB_TOKEN) never fails
      # the job/workflow (FR-008; research.md #6).
      - name: Post or update PR comment
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          header: quality-check-summary
          path: summary.md

  deploy-docs:
    name: deploy-docs
    needs: docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
