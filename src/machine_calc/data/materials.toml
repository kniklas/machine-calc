# Bundled default workpiece materials (FR-004 of 001-metal-drilling-calc).
#
# Lossless re-encoding of the hard-coded `_MATERIALS` list that used to live
# in `registry.py` (specs/005-configurable-materials-tools/research.md #4).
# Reference cutting-speed/feed values are canonical-metric, HSS-baseline
# figures drawn from widely published machining data (Machinery's Handbook /
# Sandvik Coromant general-purpose reference ranges for twist drilling); see
# specs/001-metal-drilling-calc/research.md #4.
#
# Schema: specs/005-configurable-materials-tools/contracts/materials-config-schema.md

